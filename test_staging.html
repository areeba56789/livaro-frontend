<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Staging API Verification</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; padding: 20px; }
        h2 { color: #58a6ff; }
        pre { background-color: #161b22; padding: 15px; border-radius: 6px; border: 1px solid #30363d; overflow: auto; white-space: pre-wrap; font-size: 14px; }
        .status { margin-bottom: 15px; font-weight: bold; }
        .success { color: #3fb950; }
        .error { color: #f85149; }
        .loading { color: #e3b341; }
    </style>
</head>
<body>
    <h2>Livaro API Staging Verification</h2>
    <div id="status" class="status loading">Testing live staging URL: https://livaro-frontend.vercel.app/api/analyze...</div>
    <pre id="output">Waiting for Vercel deployment and response...</pre>

    <script>
        async function runTest() {
            try {
                // Polling for Vercel deployment completion might be necessary, 
                // but we'll try fetching immediately.
                const response = await fetch('https://livaro-frontend.vercel.app/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: 'What is the outlook for commercial plots in DHA Phase 6?' })
                });

                const data = await response.json();
                
                const statusEl = document.getElementById('status');
                if (response.ok) {
                    statusEl.className = 'status success';
                    statusEl.innerText = `SUCCESS: HTTP ${response.status} OK`;
                } else {
                    statusEl.className = 'status error';
                    statusEl.innerText = `ERROR: HTTP ${response.status}`;
                }
                
                document.getElementById('output').innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                const statusEl = document.getElementById('status');
                statusEl.className = 'status error';
                statusEl.innerText = `NETWORK ERROR: ${err.message}`;
                document.getElementById('output').innerText = err.stack;
            }
        }
        
        // Wait a few seconds to let Vercel deploy if it hasn't finished yet
        setTimeout(runTest, 2000);
    </script>
</body>
</html>
